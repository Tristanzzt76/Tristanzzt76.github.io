<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zhizitan's Blog — 后台管理</title>
  <style>
    /* 修复字段标签黑色 header bar */
    [class*="WidgetHeader"],
    [class*="widget-header"],
    [class*="FieldHeader"],
    [class*="LabelWrapper"],
    [class*="label-wrapper"],
    [class*="ObjectWidgetTopBar"],
    [class*="TopBar"] {
      background: transparent !important;
      background-color: transparent !important;
    }

    /* 确保字段 label 文字颜色正常 */
    [class*="WidgetHeader"] span,
    [class*="FieldLabel"],
    [class*="label"] {
      color: #374151 !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <style>
    #home-btn {
      position: fixed; bottom: 24px; left: 24px; z-index: 99999;
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      background: #1e293b; color: #e2e8f0 !important;
      border-radius: 20px; font-size: 13px; font-weight: 500;
      text-decoration: none !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: all 0.2s ease;
    }
    #home-btn:hover { opacity: 0.85; transform: translateY(-2px); color: #fff !important; }
  </style>
  <a id="home-btn" href="https://tristanzzt76.github.io/" target="_blank">🏠 主页</a>
</body>
</html>
